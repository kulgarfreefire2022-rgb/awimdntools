<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWIMEDAN STORE - Premium Car Parking Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        * { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s ease-in-out; }
        
        body { 
            background: #0a0a0a; 
            color: #ffffff; 
            overflow-x: hidden;
            background-image: linear-gradient(to bottom, rgba(10,10,10,0.9), #0a0a0a), url('https://w0.peakpx.com/wallpaper/424/62/HD-wallpaper-r34-nissan-skyline-gtr-bayside-blue-jdm.jpg');
            background-attachment: fixed;
            background-size: cover;
        }

        /* Panel Styling Seperti Gambar Referensi */
        .panel-container {
            background: #11141b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .panel-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
        }

        .panel-input {
            background: #161b22;
            border: 1px solid #21262d;
            color: white;
            border-radius: 6px;
            padding: 12px 15px;
            width: 100%;
            outline: none;
        }

        .panel-input:focus {
            border-color: #ff3131;
            background: #1c2128;
        }

        .warning-box {
            background: rgba(255, 171, 0, 0.1);
            border: 1px solid rgba(255, 171, 0, 0.2);
            color: #ffab00;
            padding: 10px;
            border-radius: 6px;
            font-size: 11px;
            text-align: center;
        }

        .btn-execute {
            background: #ff3131;
            color: white;
            font-weight: 800;
            padding: 12px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }

        .btn-execute:hover { background: #d62828; }

        /* Style Bawaan Sebelumnya */
        .glass-nav { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-title { font-weight: 800; letter-spacing: -0.05em; line-height: 0.9; }
        .accent-red { color: #ff3131; }
        .bg-accent-red { background: #ff3131; }
        .stat-card { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; }
        .sidebar-glass { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px); z-index: 1000; border-left: 1px solid rgba(255, 49, 49, 0.2); }
        [x-cloak] { display: none !important; }
        .banner-container { position: relative; width: 100%; padding-top: 56.25%; overflow: hidden; border-radius: 8px; background: #111; }
        .banner-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body x-data="app()" x-init="init()">

    <nav class="fixed top-0 left-0 right-0 h-20 glass-nav z-[100] flex items-center">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" @click="currentPage = 'home'">
                <img src="images/logo.jpg" class="w-10 h-10 rounded-full border border-red-600" alt="AWIMEDAN">
                <span class="text-2xl font-black italic tracking-tighter">AWIMEDAN</span>
            </div>
            <div class="hidden md:flex space-x-8 text-sm font-bold uppercase tracking-widest">
                <span @click="currentPage = 'home'" :class="currentPage === 'home' ? 'accent-red' : 'text-gray-400'" class="cursor-pointer hover:text-white">Store</span>
                <span @click="currentPage = 'tools'" :class="currentPage === 'tools' ? 'accent-red' : 'text-gray-400'" class="cursor-pointer hover:text-white">Tools</span>
                <span @click="currentPage = 'topup'" :class="currentPage === 'topup' ? 'accent-red' : 'text-gray-400'" class="text-gray-400 cursor-pointer hover:text-white">Top Up</span>
            </div>
            <div class="flex items-center space-x-3">
                <template x-if="!user">
                    <button @click="loginGoogle()" class="bg-accent-red px-5 py-2 rounded-md font-bold text-xs">LOGIN</button>
                </template>
                <template x-if="user">
                    <div @click="sideBar = true" class="flex items-center bg-white/5 px-3 py-1.5 rounded-lg border border-white/10 cursor-pointer">
                        <img :src="user.photoURL" class="w-7 h-7 rounded-full mr-2 border border-red-500">
                        <span class="text-xs font-bold" x-text="'Rp ' + (userData.balance || 0).toLocaleString()"></span>
                    </div>
                </template>
                <button @click="sideBar = true" class="text-xl px-2"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </nav>

    <div x-show="sideBar" class="fixed inset-0 z-[1000]" x-cloak>
        <div @click="sideBar = false" class="absolute inset-0 bg-black/90"></div>
        <div class="absolute right-0 top-0 h-full w-80 sidebar-glass p-8" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
            <div class="flex justify-between items-center mb-10">
                <h2 class="font-black italic text-xl accent-red tracking-tighter">ACCOUNT PANEL</h2>
                <i @click="sideBar = false" class="fas fa-times text-2xl cursor-pointer"></i>
            </div>
            <template x-if="user">
                <div class="space-y-6">
                    <div class="flex items-center space-x-4 p-4 bg-white/5 rounded-xl">
                        <img :src="user.photoURL" class="w-12 h-12 rounded-full border-2 border-red-600">
                        <div class="overflow-hidden">
                            <p class="font-bold truncate" x-text="user.displayName"></p>
                            <p class="text-[10px] text-gray-500 truncate uppercase" x-text="user.email"></p>
                        </div>
                    </div>
                    <div class="p-6 bg-accent-red rounded-xl text-center shadow-lg">
                        <p class="text-[10px] uppercase font-bold text-white/70 mb-1">Total Saldo</p>
                        <p class="text-2xl font-black" x-text="'Rp ' + (userData.balance || 0).toLocaleString()"></p>
                    </div>
                    <div class="grid grid-cols-1 gap-2">
                        <button @click="currentPage = 'topup'; sideBar = false" class="w-full text-left p-4 hover:bg-white/5 rounded-lg flex items-center font-bold text-sm"><i class="fas fa-wallet w-8 accent-red"></i> Top Up Saldo</button>
                        <button @click="currentPage = 'history'; sideBar = false" class="w-full text-left p-4 hover:bg-white/5 rounded-lg flex items-center font-bold text-sm"><i class="fas fa-history w-8 accent-red"></i> Riwayat</button>
                        <template x-if="isAdmin"><button @click="currentPage = 'admin'; sideBar = false" class="w-full text-left p-4 text-yellow-500 hover:bg-white/5 rounded-lg flex items-center font-bold text-sm"><i class="fas fa-user-shield w-8"></i> ADMIN PANEL</button></template>
                        <button @click="logoutGoogle()" class="w-full text-left p-4 text-red-500 hover:bg-red-500/10 rounded-lg flex items-center font-bold text-sm"><i class="fas fa-sign-out-alt w-8"></i> Logout</button>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <main class="pt-24 pb-20">
        <div x-show="currentPage === 'home'" x-transition class="container mx-auto px-4">
             <div class="text-center py-12 mb-12">
                <h1 class="hero-title text-6xl md:text-8xl italic uppercase mb-4">AWIMEDAN <span class="accent-red">STORE</span></h1>
                <p class="text-gray-400 max-w-2xl mx-auto text-sm">Platform modifikasi akun Car Parking Multiplayer #1 di Indonesia.</p>
                <div class="flex flex-wrap justify-center gap-4 mt-10">
                    <button @click="document.getElementById('catalog').scrollIntoView({behavior:'smooth'})" class="bg-red-600 px-10 py-4 rounded-lg font-black italic">LIHAT TOKO</button>
                    <button @click="currentPage = 'topup'" class="bg-white/5 border border-white/10 px-10 py-4 rounded-lg font-black italic">TOP UP SALDO</button>
                </div>
            </div>

            <div id="catalog" class="py-12">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <template x-for="p in products" :key="p.name">
                        <div class="stat-card p-4 flex flex-col hover:border-red-600 group transition-all">
                            <div class="banner-container mb-5">
                                <img :src="p.img" class="w-full h-full object-cover group-hover:scale-105">
                            </div>
                            <h3 class="font-bold text-lg mb-2" x-text="p.name"></h3>
                            <div class="flex items-center justify-between mt-auto pt-4 border-t border-white/5">
                                <p class="accent-red font-black text-xl" x-text="'Rp ' + p.price.toLocaleString()"></p>
                                <button @click="beliProduk(p.name)" class="bg-white text-black px-4 py-2 rounded font-black text-[10px] uppercase tracking-tighter">Beli Sekarang</button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div x-show="currentPage === 'tools'" x-transition class="container mx-auto px-4 max-w-lg">
            <div x-show="!cpmUser.isLoggedIn" class="panel-container overflow-hidden" x-cloak>
                <div class="panel-header bg-[#1c2128]">
                    <h2 class="text-sm font-black italic uppercase tracking-wider">Injector Login System</h2>
                </div>
                
                <div class="p-6 space-y-5">
                    <div class="warning-box">
                        <i class="fas fa-exclamation-triangle mr-2"></i> <b>WAJIB LOGOUT AKUN GAME</b><br>
                        Pastikan Anda sudah keluar dari game agar proses berhasil.
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase mb-2 block">Game Version</label>
                        <select x-model="cpmForm.gameId" class="panel-input">
                            <option value="">Pilih Versi Game</option>
                            <option value="1">CPM 1 (Original)</option>
                            <option value="2">CPM 2 (New)</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase mb-2 block">Email Game</label>
                        <input type="email" x-model="cpmForm.email" placeholder="example@gmail.com" class="panel-input">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase mb-2 block">Password Game</label>
                        <input type="password" x-model="cpmForm.password" placeholder="••••••••" class="panel-input">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase mb-2 block">Premium License Key</label>
                        <input type="text" x-model="cpmForm.key" placeholder="AWIMEDAN-XXXX-XXXX" class="panel-input !border-red-600/30 text-red-500 font-mono">
                    </div>
                    
                    <button @click="handleCpmLogin" :disabled="loading" class="btn-execute">
                        <span x-show="!loading">EXECUTE PROCESS</span>
                        <i x-show="loading" class="fas fa-circle-notch animate-spin"></i>
                    </button>
                    <p class="text-red-500 text-[10px] text-center font-bold" x-text="message"></p>
                </div>
            </div>

            <div x-show="cpmUser.isLoggedIn" class="space-y-4" x-cloak>
                <div class="panel-container overflow-hidden">
                    <div class="panel-header flex justify-between items-center bg-green-600/10">
                        <span class="text-[10px] font-black uppercase text-green-500">System Connected</span>
                        <button @click="logoutCpm" class="text-red-500 font-bold text-[10px]">DISCONNECT</button>
                    </div>
                    <div class="p-4 border-b border-white/5 bg-black/20">
                        <p class="text-[10px] text-gray-500 uppercase font-bold">User Identity</p>
                        <p class="font-bold text-sm text-gray-300" x-text="cpmUser.email"></p>
                    </div>
                    <div class="p-4 grid grid-cols-1 gap-2">
                         <button @click="setKingRank()" class="w-full bg-[#161b22] hover:bg-white/5 border border-white/10 p-4 rounded-lg flex items-center">
                            <i class="fas fa-crown text-yellow-500 w-10 text-xl"></i>
                            <div class="text-left"><p class="text-xs font-black">INJECT KING RANK</p><p class="text-[9px] text-gray-500">Set 1B Rating & Status</p></div>
                         </button>
                         <button @click="changeEmailPrompt()" class="w-full bg-[#161b22] hover:bg-white/5 border border-white/10 p-4 rounded-lg flex items-center">
                            <i class="fas fa-envelope-open-text text-red-500 w-10 text-xl"></i>
                            <div class="text-left"><p class="text-xs font-black">FORCE CHANGE EMAIL</p><p class="text-[9px] text-gray-500">Tanpa Kode Verifikasi</p></div>
                         </button>
                         <button @click="changePasswordPrompt()" class="w-full bg-[#161b22] hover:bg-white/5 border border-white/10 p-4 rounded-lg flex items-center">
                            <i class="fas fa-key text-blue-500 w-10 text-xl"></i>
                            <div class="text-left"><p class="text-xs font-black">INSTANT CHANGE PASS</p><p class="text-[9px] text-gray-500">Update Password Langsung</p></div>
                         </button>
                    </div>
                </div>
            </div>
        </div>

        <div x-show="currentPage === 'topup'" x-transition class="container mx-auto px-4 max-w-md">
            <div class="panel-container p-8 text-center">
                <h2 class="text-2xl font-black italic accent-red mb-2">TOP UP SALDO</h2>
                <div class="grid grid-cols-2 gap-2 my-6">
                    <template x-for="amt in [20000, 50000, 100000, 150000]">
                        <button @click="selectedAmount = amt" :class="selectedAmount === amt ? 'bg-red-600' : 'bg-white/5 border-white/10'" class="p-4 border rounded font-bold">Rp <span x-text="amt.toLocaleString()"></span></button>
                    </template>
                </div>
                <div x-show="selectedAmount > 0" class="space-y-4">
                    <div class="bg-white p-2 rounded-lg"><img src="qris.jpg" class="w-full"></div>
                    <button @click="sendToWhatsApp" class="w-full bg-green-600 py-4 rounded-xl font-black"><i class="fab fa-whatsapp mr-2"></i> KONFIRMASI</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        function app() {
            return {
                currentPage: 'home', sideBar: false, loading: false, message: '', user: null, userData: { balance: 0 },
                cpmUser: { isLoggedIn: false, email: '', token: '', gameData: null },
                cpmForm: { gameId: '', email: '', password: '', key: '' },
                selectedAmount: 0,
                adminEmail: "kulgarfreefire2022@gmail.com", 
                isAdmin: false,
                firebaseConfig: {
                    apiKey: "AIzaSyCNZokAKl6TVKWMOc51SCSRKZGqoG77uFI",
                    authDomain: "cpmapikey.firebaseapp.com",
                    databaseURL: "https://cpmapikey-default-rtdb.asia-southeast1.firebasedatabase.app",
                    projectId: "cpmapikey",
                    storageBucket: "cpmapikey.firebasestorage.app",
                    messagingSenderId: "372965414639",
                    appId: "1:372965414639:web:e79bb42a252336cab52d1a"
                },
                botToken: "8625213432:AAHVdpxEdFkh1vg1SF5RQha09wp6SxRlGdU",
                adminChatId: "6095762919",
                products: [
                    { name: 'Script All In One CPM 1', price: 100000, img: 'images/Script All In One AWIMEDAN CPM 1.jpg', link: 'https://raw.githubusercontent.com/indiansearnroof-eng/scrfile/main/SCRIPT%20ALL%20IN%20ONE%20AWIMEDAN%20CPM%201.lua', pass: 'USERVVIP2026' },
                    { name: 'Script Wallhack', price: 20000, img: 'images/Script Wallhack.jpg', link: 'https://raw.githubusercontent.com/indiansearnroof-eng/scrfile/main/Wallhack.lua', pass: 'USERVIP052' },
                    { name: 'Script Race 3 Second', price: 25000, img: 'images/Script Race 3sec.jpg', link: 'https://raw.githubusercontent.com/indiansearnroof-eng/scrfile/main/Wallhack.lua', pass: 'USERVIP05472' },
                    { name: 'Script Timing Kuda Permanent + Tutorial', price: 30000, img: 'images/Script Timing Kuda Permanent.jpg', link: 'https://raw.githubusercontent.com/indiansearnroof-eng/scrfile/main/Timing%20kuda%20Permanent.lua', pass: 'VipScript30k' },
                    { name: 'Script Timing Kuda Permanent', price: 15000, img: 'images/Script Timing Kuda Permanent.jpg', link: 'https://raw.githubusercontent.com/indiansearnroof-eng/scrfile/main/Timing%20kuda%20Permanent.lua', pass: 'VipScript30k' },
                    { name: 'Script 8000 / 8K Tune Up', price: 30000, img: 'images/Script 8000 Tune Up.jpg', link: 'https://raw.githubusercontent.com/indiansearnroof-eng/scrfile/main/SPEC%208000%20BY%20AWIMEDAN.lua', pass: 'AWIMEDAN100SUBS' },
                    { name: 'Script Unlimited Tires 100% & 0%', price: 20000, img: 'images/Script Unlimited Tires.jpg', link: 'https://raw.githubusercontent.com/indiansearnroof-eng/scrfile/main/SCRIPT%20TIRES%20100%25%20%26%20TIRES%200%20%25.lua', pass: 'AWIMEDANCHANNEL' },
                    { name: 'Script Timing Kuda Tune Up', price: 20000, img: 'images/Timing Kuda Tune Up.jpg', link: 'https://raw.githubusercontent.com/indiansearnroof-eng/scrfile/main/TIMING%20KUDA%20TUNE%20UP.lua', pass: 'AWIMEDAN100DUBS' },
                    { name: 'Script Velg Bakar & Chrome', price: 20000, img: 'images/Script Velg Bakar & Chrome.jpg', link: 'https://raw.githubusercontent.com/indiansearnroof-eng/scrfile/main/VELG%20BAKAR%20%26%20CHROME.lua', pass: 'AWIMEDAN100SUBS ' },
                    { name: 'Script Unlock Premium Features', price: 20000, img: 'images/Unlock Premium Features.jpg', link: 'https://raw.githubusercontent.com/indiansearnroof-eng/scrfile/main/UNLOCK%20PREMIUM.lua', pass: 'AWIMEDAN300SUBS' },
                    { name: 'Script Camper & Ufo', price: 20000, img: 'images/Script Camper & Ufo.jpg', link : 'https://raw.githubusercontent.com/indiansearnroof-eng/scrfile/main/Camper%20%26%20UFO.lua', pass: 'AWIMEDAN100SUBS' },
                    { name: 'Script Timing Kuda Slember', price: 25000, img: 'images/Timing Kuda Slember.jpg', link: 'https://raw.githubusercontent.com/indiansearnroof-eng/scrfile/main/SLEMBER%20BLAYER%20BRATATAK.lua', pass: 'AWIMEDAN100SUBS' },
                    { name: 'Script Long Name', price: 15000, img: 'images/Script Long Name.jpg', link: 'https://raw.githubusercontent.com/indiansearnroof-eng/scrfile/main/Long%20Name.lua', pass: 'USERVIP806' },
                    { name: 'CAR F1 & F2 1027+Kmh', price: 15000, img: 'images/F1 & F2 Tune Up Permanent .jpg', link: 'https://raw.githubusercontent.com/indiansearnroof-eng/scrfile/main/UserVip_F1%20FFA.lua', pass: 'USERVIP796' },
                ],
                gameApis: {
                    "1": { name: "CPM 1", api: "AIzaSyBW1ZbMiUeDZHYUO2bY8Bfnf5rRgrQGPTM", rankUrl: "https://us-central1-cp-multiplayer.cloudfunctions.net/SetUserRating4" },
                    "2": { name: "CPM 2", api: "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ", rankUrl: "https://us-central1-cpm-2-7cea1.cloudfunctions.net/SetUserRating17_AppI" }
                },
                init() {
                    if (!firebase.apps.length) firebase.initializeApp(this.firebaseConfig);
                    firebase.auth().onAuthStateChanged((u) => {
                        this.user = u;
                        if (u) {
                            this.fetchUserData(u.uid);
                            if (u.email === this.adminEmail) this.isAdmin = true;
                        }
                    });
                },
                async loginGoogle() { const provider = new firebase.auth.GoogleAuthProvider(); await firebase.auth().signInWithPopup(provider); },
                async logoutGoogle() { await firebase.auth().signOut(); location.reload(); },
                fetchUserData(uid) {
                    firebase.database().ref('users/' + uid).on('value', (snap) => {
                        if (snap.val()) this.userData = snap.val();
                        else firebase.database().ref('users/' + uid).set({ email: this.user.email, balance: 0, createdAt: Date.now() });
                    });
                },
                sendToWhatsApp() {
                    const msg = `Konfirmasi Top Up\nEmail: ${this.user.email}\nNominal: Rp ${this.selectedAmount.toLocaleString()}`;
                    window.open(`https://wa.me/6281330750863?text=${encodeURIComponent(msg)}`, '_blank');
                },
                async beliProduk(productName) {
                    if (!this.user) return alert("Silakan Login!");
                    const p = this.products.find(x => x.name === productName);
                    if ((this.userData.balance || 0) < p.price) return alert("Saldo tidak cukup!");
                    if (confirm(`Beli ${productName}?`)) {
                        this.loading = true;
                        try {
                            await firebase.database().ref('users/' + this.user.uid + '/balance').transaction(b => b - p.price);
                            await firebase.database().ref('history/' + this.user.uid).push().set({ productName, price: p.price, date: Date.now() });
                            this.logToTelegram(`🛒 **SUKSES**\nUser: ${this.user.email}\nProduk: ${productName}`);
                            window.open(p.link, '_blank');
                            alert("BERHASIL! Password: " + p.pass);
                        } catch (e) { alert(e.message); }
                        this.loading = false;
                    }
                },
                async handleCpmLogin() {
                    if (!this.cpmForm.key || !this.cpmForm.email) return;
                    this.loading = true;
                    try {
                        const snap = await firebase.database().ref('keys/' + this.cpmForm.key).once('value');
                        if (!snap.val() || snap.val().status !== 'active') throw new Error("Key Invalid!");
                        const game = this.gameApis[this.cpmForm.gameId];
                        const res = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${game.api}`, {
                            method: 'POST', body: JSON.stringify({ email: this.cpmForm.email, password: this.cpmForm.password, returnSecureToken: true })
                        });
                        const data = await res.json();
                        if (data.idToken) {
                            this.cpmUser = { isLoggedIn: true, email: data.email, token: data.idToken, gameData: game };
                            this.logToTelegram(`✅ **LOGIN SUCCESS**\nAcc: \`${data.email}\``);
                        } else throw new Error("Login Gagal!");
                    } catch (e) { this.message = e.message; }
                    this.loading = false;
                },
                async setKingRank() {
                    try {
                        await fetch(this.cpmUser.gameData.rankUrl, { method: 'POST', body: JSON.stringify({ "auth": this.cpmUser.token, "rating": 1000000000 }) });
                        alert("SUKSES!");
                    } catch (e) { alert("Gagal!"); }
                },
                async changeEmailPrompt() {
                    const ne = prompt("Email Baru:");
                    if(!ne) return;
                    try {
                        const res = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/setAccountInfo?key=${this.cpmUser.gameData.api}`, {
                            method: 'POST', body: JSON.stringify({ idToken: this.cpmUser.token, email: ne, returnSecureToken: true, upgradeToFederatedLogin: true })
                        });
                        if(res.ok) alert("Berhasil!"); else alert("Gagal!");
                    } catch (e) { alert("Error!"); }
                },
                async changePasswordPrompt() {
                    const np = prompt("Password Baru:");
                    if(!np) return;
                    try {
                        const res = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/setAccountInfo?key=${this.cpmUser.gameData.api}`, {
                            method: 'POST', body: JSON.stringify({ idToken: this.cpmUser.token, password: np, returnSecureToken: true })
                        });
                        if(res.ok) alert("Berhasil!"); else alert("Gagal!");
                    } catch (e) { alert("Error!"); }
                },
                logoutCpm() { this.cpmUser = { isLoggedIn: false }; },
                logToTelegram(t) {
                    fetch(`https://api.telegram.org/bot${this.botToken}/sendMessage`, {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ chat_id: this.adminChatId, text: t, parse_mode: "Markdown" })
                    });
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
