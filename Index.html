<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWIMEDAN STORE - Premium Car Parking Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s ease-in-out; }
        body { 
            background: #0a0a0a; color: #ffffff; overflow-x: hidden;
            background-image: linear-gradient(to bottom, rgba(10,10,10,0.8), #0a0a0a), url('https://w0.peakpx.com/wallpaper/424/62/HD-wallpaper-r34-nissan-skyline-gtr-bayside-blue-jdm.jpg');
            background-attachment: fixed; background-size: cover;
        }
        .glass-nav { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-title { font-weight: 800; letter-spacing: -0.05em; line-height: 0.9; }
        .accent-red { color: #ff3131; }
        .bg-accent-red { background: #ff3131; }
        .stat-card { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; }
        .btn-primary { background: #ff3131; box-shadow: 0 4px 15px rgba(255, 49, 49, 0.3); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-glass { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px); z-index: 1000; border-left: 1px solid rgba(255, 49, 49, 0.2); }
        [x-cloak] { display: none !important; }
        .banner-container { position: relative; width: 100%; padding-top: 56.25%; overflow: hidden; border-radius: 8px; background: #111; }
        .banner-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body x-data="window.app()" x-init="init()">

    <nav class="fixed top-0 left-0 right-0 h-20 glass-nav z-[100] flex items-center">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" @click="currentPage = 'home'">
                <img src="images/logo.jpg" class="w-10 h-10 rounded-full border border-red-600" alt="AWIMEDAN">
                <span class="text-2xl font-black italic tracking-tighter">AWIMEDAN</span>
            </div>
            <div class="hidden md:flex space-x-8 text-sm font-bold uppercase tracking-widest">
                <span @click="currentPage = 'home'" :class="currentPage === 'home' ? 'accent-red' : 'text-gray-400'" class="cursor-pointer hover:text-white">Store</span>
                <span @click="currentPage = 'tools'" :class="currentPage === 'tools' ? 'accent-red' : 'text-gray-400'" class="cursor-pointer hover:text-white">Tools</span>
                <span @click="currentPage = 'buykey'" :class="currentPage === 'buykey' ? 'accent-red' : 'text-gray-400'" class="cursor-pointer hover:text-white">BUY KEY</span>
                <span @click="currentPage = 'topup'" :class="currentPage === 'topup' ? 'accent-red' : 'text-gray-400'" class="cursor-pointer hover:text-white">Top Up</span>
            </div>
            <div class="flex items-center space-x-3">
                <template x-if="!user">
                    <button @click="loginGoogle()" class="bg-accent-red px-5 py-2 rounded-md font-bold text-xs flex items-center"><i class="fas fa-user mr-2"></i> LOGIN</button>
                </template>
                <template x-if="user">
                    <div @click="sideBar = true" class="flex items-center bg-white/5 px-3 py-1.5 rounded-lg border border-white/10 cursor-pointer">
                        <img :src="user.photoURL" class="w-7 h-7 rounded-full mr-2 border border-red-500">
                        <span class="text-xs font-bold" x-text="'Rp ' + (userData.balance || 0).toLocaleString()"></span>
                    </div>
                </template>
                <button @click="sideBar = true" class="text-xl px-2"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </nav>

    <div x-show="sideBar" class="fixed inset-0 z-[1000]" x-cloak>
        <div @click="sideBar = false" class="absolute inset-0 bg-black/90"></div>
        <div class="absolute right-0 top-0 h-full w-80 sidebar-glass p-8" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
            <div class="flex justify-between items-center mb-10">
                <h2 class="font-black italic text-xl accent-red tracking-tighter">ACCOUNT PANEL</h2>
                <i @click="sideBar = false" class="fas fa-times text-2xl cursor-pointer"></i>
            </div>
            <template x-if="user">
                <div class="space-y-6">
                    <div class="flex items-center space-x-4 p-4 bg-white/5 rounded-xl">
                        <img :src="user.photoURL" class="w-12 h-12 rounded-full border-2 border-red-600">
                        <div class="overflow-hidden">
                            <p class="font-bold truncate" x-text="user.displayName"></p>
                            <p class="text-[10px] text-gray-500 truncate uppercase" x-text="user.email"></p>
                        </div>
                    </div>
                    <div class="p-6 bg-accent-red rounded-xl text-center shadow-lg shadow-red-600/20">
                        <p class="text-2xl font-black" x-text="'Rp ' + (userData.balance || 0).toLocaleString()"></p>
                    </div>
                    <div class="grid grid-cols-1 gap-2">
                        <button @click="currentPage = 'topup'; sideBar = false" class="w-full text-left p-4 hover:bg-white/5 rounded-lg flex items-center font-bold text-sm"><i class="fas fa-wallet w-8 accent-red"></i> Top Up Saldo</button>
                        <button @click="currentPage = 'history'; sideBar = false" class="w-full text-left p-4 hover:bg-white/5 rounded-lg flex items-center font-bold text-sm"><i class="fas fa-history w-8 accent-red"></i> Riwayat</button>
                        <template x-if="isAdmin">
                            <button @click="currentPage = 'admin'; sideBar = false" class="w-full text-left p-4 text-yellow-500 hover:bg-white/5 rounded-lg flex items-center font-bold text-sm"><i class="fas fa-user-shield w-8"></i> ADMIN PANEL</button>
                        </template>
                        <button @click="logoutGoogle()" class="w-full text-left p-4 text-red-500 hover:bg-red-500/10 rounded-lg flex items-center font-bold text-sm mt-4 border-t border-white/5"><i class="fas fa-sign-out-alt w-8"></i> Logout</button>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <main class="pt-24 pb-20">
        <div x-show="currentPage === 'home'" x-transition class="container mx-auto px-4">
            <div class="text-center py-12 mb-12">
                <h1 class="hero-title text-6xl md:text-8xl italic uppercase mb-4">AWIMEDAN <span class="accent-red">STORE</span></h1>
                <p class="text-gray-400 max-w-2xl mx-auto text-sm">Platform modifikasi akun Car Parking Multiplayer #1 di Indonesia.</p>
                <div class="flex justify-center gap-4 mt-10">
                    <button @click="document.getElementById('catalog').scrollIntoView({behavior:'smooth'})" class="btn-primary px-10 py-4 rounded-lg font-black italic">LIHAT TOKO</button>
                </div>
            </div>
            <div id="catalog" class="py-12">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <template x-for="p in products" :key="p.name">
                        <div class="stat-card p-6 flex flex-col hover:border-red-600 group">
                            <div class="banner-container mb-5"><img :src="p.img" class="group-hover:scale-105 transition"></div>
                            <h3 class="font-bold mb-2 truncate" x-text="p.name"></h3>
                            <div class="flex items-center justify-between mt-auto pt-4 border-t border-white/5">
                                <p class="accent-red font-black text-xl" x-text="'Rp ' + p.price.toLocaleString()"></p>
                                <button @click="beliProduk(p.name)" class="bg-white text-black px-4 py-2 rounded font-black text-[10px] uppercase">Beli</button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div x-show="currentPage === 'tools'" x-transition class="container mx-auto px-4 max-w-xl">
             <div x-show="!cpmUser.isLoggedIn" class="stat-card p-10 border-red-600/20">
                <h2 class="text-2xl font-black italic text-center mb-8">TOOLS INJECTOR</h2>
                <div class="space-y-4">
                    <select x-model="cpmForm.gameId" class="w-full bg-black border border-white/10 p-4 rounded-lg text-sm"><option value="">Pilih Versi Game</option><option value="1">CPM 1</option><option value="2">CPM 2</option></select>
                    <input type="email" x-model="cpmForm.email" placeholder="Email Game" class="w-full bg-black border border-white/10 p-4 rounded-lg text-sm">
                    <input type="password" x-model="cpmForm.password" placeholder="Password Game" class="w-full bg-black border border-white/10 p-4 rounded-lg text-sm">
                    <input type="text" x-model="cpmForm.key" placeholder="License Key" class="w-full bg-black border border-red-600/30 p-4 rounded-lg text-sm text-red-500">
                    <button @click="handleCpmLogin" class="w-full btn-primary py-4 rounded-xl font-black italic">LOGIN TOOL</button>
                    <p class="text-red-500 text-xs text-center font-bold" x-text="message"></p>
                </div>
            </div>
            <div x-show="cpmUser.isLoggedIn" class="space-y-4" x-cloak>
                <div class="stat-card p-4 flex justify-between items-center"><p class="font-bold text-sm" x-text="cpmUser.email"></p><button @click="logoutCpm" class="text-red-500 text-[10px] font-black">LOGOUT</button></div>
                <button @click="setKingRank" class="stat-card p-6 w-full text-left font-black italic hover:bg-red-600/10">INJECT KING RANK</button>
                <button @click="changeEmailPrompt" class="stat-card p-6 w-full text-left font-black italic hover:bg-red-600/10">FORCE CHANGE EMAIL</button>
                <button @click="changePasswordPrompt" class="stat-card p-6 w-full text-left font-black italic hover:bg-red-600/10">INSTANT CHANGE PASS</button>
            </div>
        </div>

        <div x-show="currentPage === 'buykey'" x-transition class="container mx-auto px-4 max-w-5xl">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="stat-card p-8 text-center"><h3 class="font-black italic">VIP 7 DAY</h3><p class="text-2xl font-black accent-red my-4">Rp 25.000</p><button @click="beliKey('VIP 7 DAY', 25000)" class="w-full btn-primary py-3 rounded font-black italic text-xs">BELI</button></div>
                <div class="stat-card p-8 text-center border-red-600 border-2"><h3 class="font-black italic">VIP 1 MONTH</h3><p class="text-2xl font-black accent-red my-4">Rp 75.000</p><button @click="beliKey('VIP 1 MONTH', 75000)" class="w-full btn-primary py-3 rounded font-black italic text-xs">BELI</button></div>
                <div class="stat-card p-8 text-center"><h3 class="font-black italic">UNLIMITED</h3><p class="text-2xl font-black accent-red my-4">Rp 200.000</p><button @click="beliKey('UNLIMITED', 200000)" class="w-full btn-primary py-3 rounded font-black italic text-xs">BELI</button></div>
            </div>
        </div>

        <div x-show="currentPage === 'topup'" x-transition class="container mx-auto px-4 max-w-md">
            <div class="stat-card p-8 text-center">
                <h2 class="text-2xl font-black italic accent-red mb-4">TOP UP SALDO</h2>
                <div class="grid grid-cols-2 gap-2 mb-6">
                    <template x-for="amt in [20000, 50000, 100000, 150000]">
                        <button @click="selectedAmount = amt" :class="selectedAmount === amt ? 'bg-red-600 text-white' : 'bg-white/5 text-gray-400'" class="p-4 rounded-lg font-bold text-sm">Rp <span x-text="amt.toLocaleString()"></span></button>
                    </template>
                </div>
                <div x-show="selectedAmount > 0"><img src="qris.jpg" class="w-full rounded-xl mb-4"><button @click="sendToWhatsApp" class="w-full bg-green-600 py-4 rounded-xl font-black"><i class="fab fa-whatsapp mr-2"></i> KONFIRMASI ADMIN</button></div>
            </div>
        </div>

        <template x-if="isAdmin">
            <div x-show="currentPage === 'admin'" x-transition class="container mx-auto px-4">
                <div class="stat-card p-6 overflow-x-auto">
                    <h2 class="text-xl font-black italic mb-6 accent-red">ADMIN CONTROL</h2>
                    <table class="w-full text-left text-xs uppercase">
                        <tbody class="divide-y divide-white/5">
                            <template x-for="u in allUsers" :key="u.id">
                                <tr>
                                    <td class="p-4" x-text="u.email"></td>
                                    <td class="p-4 accent-red font-black" x-text="'Rp ' + (u.balance || 0).toLocaleString()"></td>
                                    <td class="p-4 flex gap-2"><button @click="updateBalance(u.id, 10000)" class="bg-green-600/20 text-green-500 px-2 py-1 rounded">+10K</button></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </template>
    </main>

    <script>
