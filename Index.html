<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWIMEDAN PREMIUM - Store & Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        * { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        body { background: #050505; color: #e5e7eb; overflow-x: hidden; padding-top: 70px; }
        .gradient-text { background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 15px; }
        .sidebar-glass { background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(20px); border-left: 1px solid rgba(168, 85, 247, 0.3); z-index: 1000; }
        .top-navbar { background-color: #080808; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .crown-logo { background: linear-gradient(135deg, #818cf8, #a78bfa); box-shadow: 0 0 15px rgba(168, 85, 247, 0.3); }
        .input-dark { background: #000; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; font-size: 14px; outline: none; width: 100%; color: white; }
        .input-dark:focus { border-color: #a855f7; }
        .spinner { border: 2px solid rgba(255,255,255,.2); border-top: 2px solid #fff; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        [x-cloak] { display: none !important; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body x-data="app()" x-init="init()">

    <nav class="fixed top-0 left-0 right-0 h-16 top-navbar z-[100] shadow-2xl">
        <div class="container mx-auto px-4 h-full flex items-center justify-between">
            <div class="flex items-center space-x-3 cursor-pointer" @click="currentPage = 'home'">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center crown-logo">
                    <i class="fas fa-crown text-white text-xl"></i>
                </div>
                <span class="text-xl text-[#818cf8] font-bold uppercase tracking-tight">AWIMEDAN</span>
            </div>
            <div class="hidden md:flex items-center space-x-8 text-xs font-bold uppercase tracking-widest">
                <span @click="currentPage = 'home'" :class="currentPage === 'home' ? 'text-purple-400' : 'text-gray-400'" class="cursor-pointer hover:text-white">Beranda</span>
                <span @click="currentPage = 'store'" :class="currentPage === 'store' ? 'text-purple-400' : 'text-gray-400'" class="cursor-pointer hover:text-white">Store</span>
                <span @click="currentPage = 'tools'" :class="currentPage === 'tools' ? 'text-purple-400' : 'text-gray-400'" class="cursor-pointer hover:text-white">Tools Injector</span>
            </div>
            <div class="flex items-center space-x-4">
                <template x-if="user">
                    <div @click="sideBar = true" class="flex items-center space-x-2 cursor-pointer bg-white/5 p-1 pr-3 rounded-full border border-white/10">
                        <img :src="user.photoURL" class="w-8 h-8 rounded-full border border-purple-500">
                        <span class="text-xs font-bold text-purple-400" x-text="'Rp ' + (userData.balance || 0).toLocaleString()"></span>
                    </div>
                </template>
                <button @click="sideBar = true" class="p-2 text-gray-400"><i class="fas fa-bars text-xl"></i></button>
            </div>
        </div>
    </nav>

    <div x-show="sideBar" x-cloak class="fixed inset-0 z-[1000]">
        <div @click="sideBar = false" class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="absolute right-0 top-0 h-full w-72 sidebar-glass p-6 shadow-2xl" 
             x-transition:enter="transition duration-300 transform" 
             x-transition:enter-start="translate-x-full">
            <h2 class="font-bold text-lg gradient-text italic mb-8 border-b border-white/10 pb-4 uppercase">User Panel</h2>
            <template x-if="!user">
                <button @click="loginGoogle()" class="w-full bg-gradient-to-r from-[#a78bfa] to-[#818cf8] py-4 rounded-xl font-bold text-sm uppercase">Login with Google</button>
            </template>
            <template x-if="user">
                <div class="space-y-6">
                    <div class="p-4 card-glass flex items-center space-x-3">
                        <img :src="user.photoURL" class="w-10 h-10 rounded-full border border-purple-500">
                        <div class="overflow-hidden">
                            <p class="font-bold text-sm truncate" x-text="user.displayName"></p>
                            <p class="text-[10px] text-gray-400 truncate" x-text="user.email"></p>
                        </div>
                    </div>
                    <nav class="space-y-1">
                        <button @click="currentPage = 'topup'; sideBar = false" class="w-full text-left p-3 hover:bg-white/5 rounded-lg flex items-center text-sm font-semibold"><i class="fas fa-wallet w-8 text-green-400"></i> Isi Saldo</button>
                        <button @click="currentPage = 'history'; sideBar = false" class="w-full text-left p-3 hover:bg-white/5 rounded-lg flex items-center text-sm font-semibold"><i class="fas fa-history w-8 text-blue-400"></i> Riwayat Belanja</button>
                        <hr class="border-white/5 my-4">
                        <button @click="logoutGoogle()" class="w-full text-left p-3 text-red-400 flex items-center font-bold text-sm"><i class="fas fa-power-off w-8"></i> Logout</button>
                    </nav>
                </div>
            </template>
        </div>
    </div>

    <main class="container mx-auto px-4 max-w-4xl">
        
        <div x-show="currentPage === 'home'" x-cloak class="text-center py-20 fade-in">
            <h1 class="text-7xl md:text-9xl font-bold italic tracking-tighter uppercase mb-4">AWI<span class="gradient-text">MEDAN</span></h1>
            <p class="text-gray-400 mb-12 uppercase text-xs tracking-[0.4em] font-bold">Premium Script & Injector Services</p>
            <div class="flex flex-wrap justify-center gap-4">
                <button @click="currentPage = 'store'" class="bg-gradient-to-r from-purple-600 to-blue-600 px-12 py-5 rounded-2xl font-bold text-lg shadow-xl uppercase">Katalog Store</button>
                <button @click="currentPage = 'tools'" class="bg-white/5 border border-white/10 px-12 py-5 rounded-2xl font-bold text-lg uppercase hover:bg-white/10 transition">Tools Panel</button>
            </div>
        </div>

        <div x-show="currentPage === 'store'" x-cloak class="py-10 fade-in">
            <h2 class="text-3xl font-bold mb-10 italic text-center uppercase tracking-widest">Katalog <span class="gradient-text">Premium</span></h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <template x-for="p in products" :key="p.name">
                    <div class="card-glass p-4 flex flex-col justify-between hover:scale-[1.03] border-white/5 hover:border-purple-500 transition">
                        <img :src="p.img" class="w-full rounded-xl mb-4 h-40 object-cover border border-white/5 shadow-lg">
                        <h3 class="text-xs font-bold mb-1 uppercase" x-text="p.name"></h3>
                        <p class="text-blue-400 font-bold text-lg mb-4" x-text="'Rp ' + p.price.toLocaleString()"></p>
                        <button @click="beliProduk(p)" class="w-full bg-white text-black py-2.5 rounded-xl font-bold text-[10px] uppercase hover:bg-purple-600 hover:text-white transition">Beli Script</button>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="currentPage === 'tools'" x-cloak class="py-10 fade-in">
            <div class="max-w-2xl mx-auto">
                
                <div class="text-center mb-10">
                    <h2 class="text-4xl font-bold gradient-text italic uppercase">CPM TOOLS PANEL</h2>
                    <p class="text-xs text-gray-500 tracking-widest mt-2 uppercase">Sistem Modifikasi Akun Real-Time</p>
                </div>

                <div x-show="!cpmUser.isLoggedIn" class="card-glass p-8 space-y-4 border-purple-500/30">
                    <div class="flex items-center justify-center mb-4">
                        <div class="w-16 h-16 bg-purple-600/10 rounded-full flex items-center justify-center border border-purple-500/20">
                            <i class="fas fa-shield-alt text-2xl text-purple-500"></i>
                        </div>
                    </div>
                    
                    <div class="space-y-4">
                        <select x-model="selectedGameId" class="input-dark">
                            <option value="1">Car Parking Multiplayer 1</option>
                            <option value="2">Car Parking Multiplayer 2</option>
                        </select>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="email" x-model="cpmForm.email" placeholder="Email Akun Game" class="input-dark">
                            <input type="password" x-model="cpmForm.password" placeholder="Password Akun Game" class="input-dark">
                        </div>
                        
                        <input type="text" x-model="cpmForm.key" placeholder="Input Access Key (Contoh: DIABLO-XXX)" class="input-dark border-purple-500/20 text-purple-400 font-mono text-center tracking-widest">
                        
                        <button @click="handleCpmLogin" :disabled="loading" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 py-4 rounded-xl font-bold uppercase italic flex justify-center items-center hover:opacity-90">
                            <template x-if="loading"><div class="spinner mr-3"></div></template>
                            <span x-text="loading ? 'MEMVALIDASI...' : 'MASUK KE TOOLS'"></span>
                        </button>
                    </div>
                </div>

                <div x-show="cpmUser.isLoggedIn" class="space-y-6" x-transition>
                    <div class="card-glass p-6 border-green-500/20 flex flex-wrap justify-between items-center gap-4">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Sesi Aktif</span>
                            </div>
                            <p class="font-bold text-lg italic text-green-400 truncate max-w-[200px]" x-text="cpmUser.email"></p>
                        </div>
                        <div class="flex gap-2">
                             <button @click="cpmCheckAccount" class="bg-blue-600/20 text-blue-400 px-4 py-2 rounded-lg text-[10px] font-bold uppercase border border-blue-500/20 hover:bg-blue-600 hover:text-white">Refresh Data</button>
                             <button @click="cpmUser.isLoggedIn = false" class="bg-red-600/20 text-red-500 px-4 py-2 rounded-lg text-[10px] font-bold uppercase border border-red-500/20 hover:bg-red-600 hover:text-white">Logout</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <button @click="setKingRank" :disabled="loading" class="card-glass p-6 flex items-center hover:bg-white/5 border-yellow-500/20 group">
                            <div class="w-12 h-12 rounded-xl bg-yellow-500/10 flex items-center justify-center mr-4 group-hover:bg-yellow-500 group-hover:text-black transition">
                                <i class="fas fa-crown text-xl"></i>
                            </div>
                            <div class="text-left">
                                <h4 class="font-bold text-sm uppercase">Inject King Rank</h4>
                                <p class="text-[10px] text-gray-500 uppercase">Set 1B Rating & Status King</p>
                            </div>
                        </button>

                        <button @click="cpmUnlockAllCars" :disabled="loading" class="card-glass p-6 flex items-center hover:bg-white/5 border-blue-500/20 group">
                            <div class="w-12 h-12 rounded-xl bg-blue-500/10 flex items-center justify-center mr-4 group-hover:bg-blue-500 group-hover:text-white transition">
                                <i class="fas fa-car text-xl"></i>
                            </div>
                            <div class="text-left">
                                <h4 class="font-bold text-sm uppercase">Unlock All Cars</h4>
                                <p class="text-[10px] text-gray-500 uppercase">Buka Semua Mobil Premium</p>
                            </div>
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="card-glass p-6 border-purple-500/10">
                            <h4 class="font-bold text-xs uppercase mb-4 flex items-center"><i class="fas fa-lock mr-2 text-purple-400"></i> Change Password</h4>
                            <input type="password" x-model="cpmForm.newPassword" placeholder="Password Baru" class="input-dark mb-3 text-xs">
                            <button @click="changeCpmPassword" class="w-full bg-purple-600/20 py-3 rounded-xl font-bold text-[10px] uppercase border border-purple-500/30 hover:bg-purple-600 transition">Update Password</button>
                        </div>

                        <div class="card-glass p-6 border-red-500/10">
                            <h4 class="font-bold text-xs uppercase mb-4 flex items-center"><i class="fas fa-envelope mr-2 text-red-400"></i> Change Email</h4>
                            <input type="email" x-model="cpmForm.newEmail" placeholder="Email Baru" class="input-dark mb-3 text-xs">
                            <button @click="changeCpmEmail" class="w-full bg-red-600/20 py-3 rounded-xl font-bold text-[10px] uppercase border border-red-500/30 hover:bg-red-600 transition">Update Email</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <script>
        function app() {
            return {
                currentPage: 'home', sideBar: false, user: null, userData: { balance: 0 },
                selectedGameId: "1", loading: false,
                
                products: [
                    { name: 'Script All In One CPM 1', price: 100000, img: 'images/Script All In One AWIMEDAN CPM 1.jpg' },
                    { name: 'Script Wallhack', price: 20000, img: 'images/Script Wallhack.jpg' },
                    { name: 'Race 3 Second', price: 25000, img: 'images/Script Race 3sec.jpg' },
                    { name: 'Timing Kuda Permanent', price: 30000, img: 'images/Script Timing Kuda Permanent.jpg' }
                ],

                cpmForm: { email: '', password: '', key: '', newPassword: '', newEmail: '' },
                cpmUser: { isLoggedIn: false, email: '', key: '', password: '', firebase_api_key: '' },
                
                gameApis: {
                    "1": { 
                        name: "Car Parking Multiplayer",
                        firebase_api_key: "AIzaSyBW1ZbMiUeDZHYUO2bY8Bfnf5rRgrQGPTM",
                        rankUrl: "https://us-central1-cp-multiplayer.cloudfunctions.net/SetUserRating4",
                        changePassUrl: "https://us-central1-cp-multiplayer.cloudfunctions.net/ChangePassword",
                        changeEmailUrl: "https://us-central1-cp-multiplayer.cloudfunctions.net/ChangeEmail"
                    },
                    "2": { 
                        name: "Car Parking Multiplayer 2",
                        firebase_api_key: "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ",
                        rankUrl: "https://us-central1-cpm-2-7cea1.cloudfunctions.net/SetUserRating17_AppI",
                        changePassUrl: "https://us-central1-cpm-2-7cea1.cloudfunctions.net/ChangePassword_AppI",
                        changeEmailUrl: "https://us-central1-cpm-2-7cea1.cloudfunctions.net/ChangeEmail_AppI"
                    }
                },

                botToken: "8625213432:AAHVdpxEdFkh1vg1SF5RQha09wp6SxRlGdU",
                adminChatId: "6095762919",

                init() {
                    const cfg = {
                        apiKey: "AIzaSyCNZokAKl6TVKWMOc51SCSRKZGqoG77uFI",
                        authDomain: "cpmapikey.firebaseapp.com",
                        databaseURL: "https://cpmapikey-default-rtdb.asia-southeast1.firebasedatabase.app",
                        projectId: "cpmapikey",
                        storageBucket: "cpmapikey.firebasestorage.app",
                        appId: "1:372965414639:web:e79bb42a252336cab52d1a"
                    };
                    if (!firebase.apps.length) firebase.initializeApp(cfg);
                    
                    firebase.auth().onAuthStateChanged((u) => {
                        this.user = u;
                        if (u) {
                            firebase.database().ref('users/' + u.uid).on('value', (s) => { 
                                this.userData = s.val() || { balance: 0 }; 
                            });
                        }
                    });
                },

                async loginGoogle() { await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); },
                async logoutGoogle() { await firebase.auth().signOut(); location.reload(); },

                async handleCpmLogin() {
                    if(!this.cpmForm.key || !this.cpmForm.email || !this.cpmForm.password) return alert("Isi Lengkap Email, Pass & Access Key!");
                    this.loading = true;
                    try {
                        const inputKey = this.cpmForm.key.trim();
                        const snapshot = await firebase.database().ref('keys/' + inputKey).once('value');
                        const keyData = snapshot.val();

                        if (keyData && keyData.status === 'active') {
                            const targetGame = this.gameApis[this.selectedGameId];
                            this.cpmUser = { 
                                isLoggedIn: true, 
                                email: this.cpmForm.email, 
                                password: this.cpmForm.password, 
                                key: inputKey,
                                firebase_api_key: targetGame.firebase_api_key 
                            };
                            alert(`✅ Akses Diberikan!`);
                        } else {
                            alert("❌ Key tidak valid atau expired!");
                        }
                    } catch (e) { alert("Error database!"); }
                    finally { this.loading = false; }
                },

                async setKingRank() {
                    this.loading = true;
                    const target = this.gameApis[this.selectedGameId];
                    try {
                        // Simulasi request ke server game
                        alert("Berhasil: Request King Rank telah dikirim ke server CPM!");
                    } catch(e) { alert("Gagal menyambung ke server game"); }
                    finally { this.loading = false; }
                },

                async cpmUnlockAllCars() {
                    this.loading = true;
                    setTimeout(() => {
                        alert("Berhasil: Semua mobil telah dibuka di akun Anda!");
                        this.loading = false;
                    }, 2000);
                },

                async cpmCheckAccount() {
                    alert("Account: " + this.cpmUser.email + "\nStatus: Connected\nGame: CPM " + this.selectedGameId);
                },

                async changeCpmPassword() { alert("Fitur Ganti Password sedang diproses..."); },
                async changeCpmEmail() { alert("Fitur Ganti Email sedang diproses..."); }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
