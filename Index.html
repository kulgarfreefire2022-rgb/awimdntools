<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWIMEDAN PREMIUM - Store & Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        * { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        body { background: #050505; color: #e5e7eb; overflow-x: hidden; padding-top: 70px; }
        
        .gradient-text { background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 15px; }
        .sidebar-glass { background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(20px); border-left: 1px solid rgba(168, 85, 247, 0.3); z-index: 1000; }
        
        .top-navbar { background-color: #080808; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .crown-logo { background: linear-gradient(135deg, #818cf8, #a78bfa); box-shadow: 0 0 15px rgba(168, 85, 247, 0.3); }
        
        /* Penting agar elemen tidak berkedip saat loading */
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="app()" x-init="init()">

    <nav class="fixed top-0 left-0 right-0 h-16 top-navbar z-[100] shadow-2xl">
        <div class="container mx-auto px-4 h-full flex items-center justify-between">
            <div class="flex items-center space-x-3 cursor-pointer" @click="currentPage = 'home'">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center crown-logo">
                    <i class="fas fa-crown text-white text-xl"></i>
                </div>
                <span class="text-xl text-[#818cf8] font-bold uppercase tracking-tight">AWIMEDAN</span>
            </div>

            <div class="hidden md:flex items-center space-x-8">
                <span @click="currentPage = 'home'" :class="currentPage === 'home' ? 'text-purple-400 border-b-2 border-purple-400' : 'text-gray-400'" class="cursor-pointer text-sm font-medium pb-1">Beranda</span>
                <span @click="currentPage = 'store'" :class="currentPage === 'store' ? 'text-purple-400 border-b-2 border-purple-400' : 'text-gray-400'" class="cursor-pointer text-sm font-medium pb-1">Store</span>
                <span @click="currentPage = 'tools'" :class="currentPage === 'tools' ? 'text-purple-400 border-b-2 border-purple-400' : 'text-gray-400'" class="cursor-pointer text-sm font-medium pb-1">Tools</span>
            </div>

            <div class="flex items-center space-x-4">
                <template x-if="!user">
                    <button @click="loginGoogle()" class="bg-gradient-to-r from-[#a78bfa] to-[#818cf8] text-white px-6 py-2 rounded-xl font-bold text-sm shadow-md transition transform hover:scale-105">Masuk</button>
                </template>
                <template x-if="user">
                    <div @click="sideBar = true" class="flex items-center space-x-2 cursor-pointer bg-white/5 p-1 pr-3 rounded-full border border-white/10">
                        <img :src="user.photoURL" class="w-8 h-8 rounded-full border border-purple-500">
                        <span class="text-xs font-bold" x-text="'Rp ' + (userData.balance || 0).toLocaleString()"></span>
                    </div>
                </template>
                <button @click="sideBar = true" class="p-2 hover:bg-white/10 rounded-lg text-gray-400"><i class="fas fa-bars text-xl"></i></button>
            </div>
        </div>
    </nav>

    <div x-show="sideBar" x-cloak class="fixed inset-0 z-[1000]">
        <div @click="sideBar = false" class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="absolute right-0 top-0 h-full w-72 sidebar-glass p-6 shadow-2xl" 
             x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
            <h2 class="font-bold text-lg gradient-text italic mb-8 border-b border-white/10 pb-4 uppercase">Account Panel</h2>
            <template x-if="user">
                <div class="space-y-6">
                    <div class="p-4 card-glass flex items-center space-x-3">
                        <img :src="user.photoURL" class="w-10 h-10 rounded-full border border-purple-500">
                        <div class="overflow-hidden">
                            <p class="font-bold text-sm truncate" x-text="user.displayName"></p>
                            <p class="text-[10px] text-gray-400 truncate" x-text="user.email"></p>
                        </div>
                    </div>
                    <div class="p-4 bg-gradient-to-r from-purple-900/40 to-blue-900/40 rounded-xl border border-white/10 text-center">
                        <p class="text-[10px] uppercase tracking-widest text-gray-400 mb-1">Saldo Anda</p>
                        <p class="text-xl font-bold text-white" x-text="'Rp ' + (userData.balance || 0).toLocaleString()"></p>
                    </div>
                    <nav class="space-y-1">
                        <button @click="currentPage = 'topup'; sideBar = false" class="w-full text-left p-3 hover:bg-white/5 rounded-lg flex items-center text-sm font-semibold"><i class="fas fa-wallet w-8 text-green-400"></i> Top Up Saldo</button>
                        <button @click="currentPage = 'history'; sideBar = false" class="w-full text-left p-3 hover:bg-white/5 rounded-lg flex items-center text-sm font-semibold"><i class="fas fa-history w-8 text-blue-400"></i> Riwayat Belanja</button>
                        <hr class="border-white/5 my-4">
                        <button @click="logoutGoogle()" class="w-full text-left p-3 hover:bg-red-500/10 text-red-400 rounded-lg flex items-center font-bold text-sm"><i class="fas fa-power-off w-8"></i> Logout</button>
                    </nav>
                </div>
            </template>
        </div>
    </div>

    <main>
        <div x-show="currentPage === 'home'" x-cloak class="container mx-auto px-4 text-center py-20">
            <h1 class="text-6xl md:text-8xl font-bold mb-6 italic tracking-tighter uppercase">AWIMEDAN <span class="gradient-text">STORE</span></h1>
            <p class="text-gray-400 max-w-xl mx-auto mb-10 text-lg">Pusat Script Premium & Tools Injector Car Parking Multiplayer Terbaik.</p>
            <div class="flex flex-wrap justify-center gap-4">
                <button @click="currentPage = 'store'" class="bg-gradient-to-r from-purple-600 to-blue-600 px-12 py-4 rounded-xl font-bold text-lg shadow-lg">BELI SCRIPT</button>
                <button @click="currentPage = 'tools'" class="bg-white/5 border border-white/10 px-12 py-4 rounded-xl font-bold text-lg hover:bg-white/10">TOOLS PANEL</button>
            </div>
        </div>

        <div x-show="currentPage === 'store'" x-cloak class="container mx-auto px-4 py-10">
            <h2 class="text-3xl font-bold mb-10 italic text-center uppercase tracking-widest">Katalog <span class="gradient-text">Script</span></h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <template x-for="p in products" :key="p.name">
                    <div class="card-glass p-4 flex flex-col justify-between hover:border-purple-500 transform hover:-translate-y-1">
                        <img :src="p.img" class="w-full rounded-lg mb-4 h-40 object-cover border border-white/5">
                        <h3 class="text-sm font-bold mb-1" x-text="p.name"></h3>
                        <p class="text-purple-400 font-bold text-lg mb-4" x-text="'Rp ' + p.price.toLocaleString()"></p>
                        <button @click="beliProduk(p.name)" class="w-full bg-white text-black py-2.5 rounded-lg font-bold text-xs uppercase">Beli Sekarang</button>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="currentPage === 'topup'" x-cloak class="container mx-auto px-4 py-10">
            <div class="max-w-md mx-auto card-glass p-8 shadow-2xl border-green-500/20">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-qrcode text-3xl text-green-500"></i>
                    </div>
                    <h2 class="text-2xl font-bold gradient-text italic uppercase">Metode Top Up QRIS</h2>
                    <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest italic text-center">Silakan pilih nominal saldo</p>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-8">
                    <template x-for="amt in [20000, 50000, 100000, 150000]" :key="amt">
                        <button @click="selectedAmount = amt" 
                                :class="selectedAmount === amt ? 'border-green-500 bg-green-500/20 text-white' : 'border-white/10 bg-white/5 text-gray-400'"
                                class="p-4 border rounded-xl font-bold transition-all text-sm">
                            Rp <span x-text="amt.toLocaleString()"></span>
                        </button>
                    </template>
                </div>

                <div x-show="selectedAmount > 0" x-transition class="mb-8 p-4 bg-white rounded-2xl border-4 border-dashed border-green-500/30">
                    <p class="text-black text-[10px] font-bold text-center mb-2 uppercase italic">Scan QRIS AWIMEDAN STORE</p>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=AWIMEDAN-PAYMENT" 
                         class="w-full aspect-square object-contain rounded-lg" alt="QRIS Payment">
                    <p class="text-center text-black font-black mt-2 text-lg italic" x-text="'TOTAL: Rp ' + selectedAmount.toLocaleString()"></p>
                </div>

                <div x-show="selectedAmount > 0" class="space-y-4">
                    <div class="p-4 bg-white/5 rounded-xl border border-white/10">
                        <label class="block text-xs text-gray-400 uppercase font-bold mb-3 italic">Upload Bukti Transfer:</label>
                        <input type="file" @change="handleFileUpload" accept="image/*" class="w-full text-xs text-gray-400 cursor-pointer">
                    </div>
                    <button @click="sendToWhatsApp" :disabled="!selectedFile"
                            :class="selectedFile ? 'opacity-100' : 'opacity-50 cursor-not-allowed'"
                            class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-xl font-bold flex items-center justify-center space-x-2">
                        <i class="fab fa-whatsapp text-xl"></i>
                        <span>KONFIRMASI KE ADMIN</span>
                    </button>
                </div>
            </div>
        </div>

        <div x-show="currentPage === 'tools'" x-cloak class="container mx-auto px-4 py-10">
            <div class="max-w-md mx-auto">
                <div x-show="!cpmUser.isLoggedIn" class="card-glass p-8 space-y-4 border-purple-500/30">
                    <h2 class="text-2xl font-bold text-center gradient-text italic mb-6">INJECTOR LOGIN</h2>
                    <input type="email" x-model="cpmForm.email" placeholder="Email Akun CPM" class="w-full bg-black border border-white/10 p-3 rounded-lg outline-none text-sm">
                    <input type="password" x-model="cpmForm.password" placeholder="Password Akun CPM" class="w-full bg-black border border-white/10 p-3 rounded-lg outline-none text-sm">
                    <input type="text" x-model="cpmForm.key" placeholder="Access Key Premium" class="w-full bg-black border border-white/10 p-3 rounded-lg outline-none text-sm font-mono text-purple-400">
                    <button @click="handleCpmLogin" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 py-4 rounded-xl font-bold transition active:scale-95">VERIFIKASI & MASUK</button>
                </div>

                <div x-show="cpmUser.isLoggedIn" class="space-y-4" x-cloak>
                    <div class="card-glass p-4 border-green-500/30 flex justify-between items-center shadow-lg">
                        <div class="text-sm">Akun: <b x-text="cpmUser.email" class="text-green-400"></b></div>
                        <button @click="cpmUser.isLoggedIn = false" class="bg-red-500/20 text-red-500 px-3 py-1 rounded text-[10px] font-bold">LOGOUT</button>
                    </div>
                    <button @click="setKingRank" class="w-full card-glass p-5 hover:bg-purple-600/20 text-left flex items-center group transition-all">
                        <i class="fas fa-crown text-3xl text-yellow-500 mr-5 group-hover:scale-110 transition"></i>
                        <div><h4 class="font-bold text-sm italic uppercase text-white">Inject King Rank</h4><p class="text-[10px] text-gray-500 uppercase">Inject 1B Rating + King Status</p></div>
                    </button>
                </div>
            </div>
        </div>

        <div x-show="currentPage === 'history'" x-cloak class="container mx-auto px-4 py-10">
            <h2 class="text-3xl font-bold mb-10 italic text-center uppercase tracking-widest">Riwayat <span class="gradient-text">Belanja</span></h2>
            <div class="max-w-2xl mx-auto space-y-4">
                <template x-for="h in userHistory" :key="h.date">
                    <div class="card-glass p-5 flex justify-between items-center border-l-4 border-l-purple-500">
                        <div>
                            <p class="font-bold text-white uppercase text-sm" x-text="h.productName"></p>
                            <p class="text-[10px] text-gray-500" x-text="new Date(h.date).toLocaleString('id-ID')"></p>
                        </div>
                        <p class="text-red-400 font-bold text-sm" x-text="'- Rp ' + h.price.toLocaleString()"></p>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <script>
        function app() {
            return {
                currentPage: 'home', sideBar: false, user: null, userData: { balance: 0 },
                selectedAmount: 0, selectedFile: null, userHistory: [],
                products: [
                    { name: 'Script All In One CPM 1', price: 100000, img: 'images/Script All In One AWIMEDAN CPM 1.jpg' },
                    { name: 'Script Wallhack', price: 20000, img: 'images/Script Wallhack.jpg' },
                    { name: 'Race 3 Second', price: 25000, img: 'images/Script Race 3sec.jpg' },
                    { name: 'Timing Kuda Permanent', price: 30000, img: 'images/Script Timing Kuda Permanent.jpg' }
                ],
                cpmForm: { email: '', password: '', key: '' },
                cpmUser: { isLoggedIn: false, email: '' },
                botToken: "8625213432:AAHVdpxEdFkh1vg1SF5RQha09wp6SxRlGdU",
                adminChatId: "6095762919",

                init() {
                    const config = {
                        apiKey: "AIzaSyCNZokAKl6TVKWMOc51SCSRKZGqoG77uFI",
                        authDomain: "cpmapikey.firebaseapp.com",
                        databaseURL: "https://cpmapikey-default-rtdb.asia-southeast1.firebasedatabase.app",
                        projectId: "cpmapikey",
                        storageBucket: "cpmapikey.firebasestorage.app",
                        appId: "1:372965414639:web:e79bb42a252336cab52d1a"
                    };
                    if (!firebase.apps.length) firebase.initializeApp(config);
                    firebase.auth().onAuthStateChanged((u) => {
                        this.user = u;
                        if (u) {
                            firebase.database().ref('users/' + u.uid).on('value', (s) => { this.userData = s.val() || { balance: 0 }; });
                            firebase.database().ref('history/' + u.uid).on('value', (s) => { 
                                const d = s.val(); this.userHistory = d ? Object.values(d).reverse() : []; 
                            });
                        }
                    });
                },

                async loginGoogle() {
                    const p = new firebase.auth.GoogleAuthProvider();
                    await firebase.auth().signInWithPopup(p);
                },

                async logoutGoogle() { await firebase.auth().signOut(); location.reload(); },

                handleFileUpload(e) { 
                    this.selectedFile = e.target.files[0]; 
                    if(this.selectedFile) this.logToTelegram(`📸 **UPLOAD BUKTI**\nUser: \`${this.user.email}\` sedang upload.`);
                },

                sendToWhatsApp() {
                    if (!this.selectedFile) return alert("Upload bukti transfer dulu!");
                    const waNum = "6281330750863";
                    const msg = `Halo Admin AWIMEDAN,\n\nSaya konfirmasi Top Up Saldo.\nEmail: ${this.user.email}\nNominal: Rp ${this.selectedAmount.toLocaleString()}\n\n(BUKTI TRANSFER AKAN SAYA LAMPIRKAN DI BAWAH)`;
                    
                    alert("PENTING: WhatsApp akan terbuka. Silakan LAMPIRKAN (Attach) kembali foto bukti transfer Anda di chat Admin.");
                    window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(msg)}`, '_blank');
                    this.logToTelegram(`📲 **KONFIRMASI WA**\nUser: \`${this.user.email}\` (Rp ${this.selectedAmount.toLocaleString()})`);
                },

                async beliProduk(name) {
                    if (!this.user) return alert("Silakan Login!");
                    const p = this.products.find(x => x.name === name);
                    if (this.userData.balance < p.price) {
                        alert("Saldo tidak cukup!");
                        this.currentPage = 'topup';
                        return;
                    }
                    if (confirm(`Beli ${name}?`)) {
                        await firebase.database().ref('users/' + this.user.uid + '/balance').transaction(b => b - p.price);
                        await firebase.database().ref('history/' + this.user.uid).push({ productName: name, price: p.price, date: Date.now() });
                        alert("Pembelian Berhasil!");
                        window.open(`https://wa.me/6281330750863?text=Saya%20beli%20${name}`, '_blank');
                    }
                },

                async handleCpmLogin() {
                    if(!this.cpmForm.key) return alert("Key Premium dibutuhkan!");
                    this.cpmUser = { isLoggedIn: true, email: this.cpmForm.email };
                },

                async setKingRank() { alert("Fitur diproses!"); },
                
                logToTelegram(t) {
                    fetch(`https://api.telegram.org/bot${this.botToken}/sendMessage`, {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ chat_id: this.adminChatId, text: t, parse_mode: "Markdown" })
                    });
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
