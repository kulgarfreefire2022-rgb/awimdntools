<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWIMEDAN PREMIUM - Store & Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        * { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        body { background: #050505; color: #e5e7eb; overflow-x: hidden; padding-top: 70px; }
        .gradient-text { background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 15px; }
        .sidebar-glass { background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(20px); border-left: 1px solid rgba(168, 85, 247, 0.3); z-index: 1000; }
        .top-navbar { background-color: #080808; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .crown-logo { background: linear-gradient(135deg, #818cf8, #a78bfa); box-shadow: 0 0 15px rgba(168, 85, 247, 0.3); }
        .input-dark { background: #000; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; font-size: 14px; outline: none; width: 100%; color: white; }
        .input-dark:focus { border-color: #a855f7; }
        .spinner { border: 2px solid rgba(255,255,255,.2); border-top: 2px solid #fff; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="app()" x-init="init()">

    <nav class="fixed top-0 left-0 right-0 h-16 top-navbar z-[100] shadow-2xl">
        <div class="container mx-auto px-4 h-full flex items-center justify-between">
            <div class="flex items-center space-x-3 cursor-pointer" @click="currentPage = 'home'">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center crown-logo">
                    <i class="fas fa-crown text-white text-xl"></i>
                </div>
                <span class="text-xl text-[#818cf8] font-bold uppercase tracking-tight">AWIMEDAN</span>
            </div>
            <div class="hidden md:flex items-center space-x-8 text-xs font-bold uppercase tracking-widest">
                <span @click="currentPage = 'home'" :class="currentPage === 'home' ? 'text-purple-400' : 'text-gray-400'" class="cursor-pointer hover:text-white">Beranda</span>
                <span @click="currentPage = 'store'" :class="currentPage === 'store' ? 'text-purple-400' : 'text-gray-400'" class="cursor-pointer hover:text-white">Store</span>
                <span @click="currentPage = 'tools'" :class="currentPage === 'tools' ? 'text-purple-400' : 'text-gray-400'" class="cursor-pointer hover:text-white">Tools Injector</span>
            </div>
            <div class="flex items-center space-x-4">
                <template x-if="user">
                    <div @click="sideBar = true" class="flex items-center space-x-2 cursor-pointer bg-white/5 p-1 pr-3 rounded-full border border-white/10">
                        <img :src="user.photoURL" class="w-8 h-8 rounded-full border border-purple-500">
                        <span class="text-xs font-bold text-purple-400" x-text="'Rp ' + (userData.balance || 0).toLocaleString()"></span>
                    </div>
                </template>
                <button @click="sideBar = true" class="p-2 text-gray-400"><i class="fas fa-bars text-xl"></i></button>
            </div>
        </div>
    </nav>

    <div x-show="sideBar" x-cloak class="fixed inset-0 z-[1000]">
        <div @click="sideBar = false" class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="absolute right-0 top-0 h-full w-72 sidebar-glass p-6 shadow-2xl" 
             x-transition:enter="transition duration-300 transform" 
             x-transition:enter-start="translate-x-full">
            <h2 class="font-bold text-lg gradient-text italic mb-8 border-b border-white/10 pb-4 uppercase">User Panel</h2>
            <template x-if="!user">
                <button @click="loginGoogle()" class="w-full bg-gradient-to-r from-[#a78bfa] to-[#818cf8] py-4 rounded-xl font-bold text-sm uppercase">Login with Google</button>
            </template>
            <template x-if="user">
                <div class="space-y-6">
                    <div class="p-4 card-glass flex items-center space-x-3">
                        <img :src="user.photoURL" class="w-10 h-10 rounded-full border border-purple-500">
                        <div class="overflow-hidden">
                            <p class="font-bold text-sm truncate" x-text="user.displayName"></p>
                            <p class="text-[10px] text-gray-400 truncate" x-text="user.email"></p>
                        </div>
                    </div>
                    <nav class="space-y-1">
                        <button @click="currentPage = 'topup'; sideBar = false" class="w-full text-left p-3 hover:bg-white/5 rounded-lg flex items-center text-sm font-semibold"><i class="fas fa-wallet w-8 text-green-400"></i> Isi Saldo</button>
                        <button @click="currentPage = 'history'; sideBar = false" class="w-full text-left p-3 hover:bg-white/5 rounded-lg flex items-center text-sm font-semibold"><i class="fas fa-history w-8 text-blue-400"></i> Riwayat Belanja</button>
                        <hr class="border-white/5 my-4">
                        <button @click="logoutGoogle()" class="w-full text-left p-3 text-red-400 flex items-center font-bold text-sm"><i class="fas fa-power-off w-8"></i> Logout</button>
                    </nav>
                </div>
            </template>
        </div>
    </div>

    <main class="container mx-auto px-4 max-w-4xl">
        
        <div x-show="currentPage === 'home'" x-cloak class="text-center py-20">
            <h1 class="text-7xl md:text-9xl font-bold italic tracking-tighter uppercase mb-4">AWI<span class="gradient-text">MEDAN</span></h1>
            <p class="text-gray-400 mb-12 uppercase text-xs tracking-[0.4em] font-bold">Premium Script & Injector Services</p>
            <div class="flex flex-wrap justify-center gap-4">
                <button @click="currentPage = 'store'" class="bg-gradient-to-r from-purple-600 to-blue-600 px-12 py-5 rounded-2xl font-bold text-lg shadow-xl uppercase">Katalog Store</button>
                <button @click="currentPage = 'tools'" class="bg-white/5 border border-white/10 px-12 py-5 rounded-2xl font-bold text-lg uppercase hover:bg-white/10 transition">Tools Panel</button>
            </div>
        </div>

        <div x-show="currentPage === 'store'" x-cloak class="py-10">
            <h2 class="text-3xl font-bold mb-10 italic text-center uppercase tracking-widest">Katalog <span class="gradient-text">Premium</span></h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <template x-for="p in products" :key="p.name">
                    <div class="card-glass p-4 flex flex-col justify-between hover:scale-[1.03] border-white/5 hover:border-purple-500 transition">
                        <img :src="p.img" class="w-full rounded-xl mb-4 h-40 object-cover border border-white/5 shadow-lg">
                        <h3 class="text-xs font-bold mb-1 uppercase" x-text="p.name"></h3>
                        <p class="text-blue-400 font-bold text-lg mb-4" x-text="'Rp ' + p.price.toLocaleString()"></p>
                        <button @click="beliProduk(p)" class="w-full bg-white text-black py-2.5 rounded-xl font-bold text-[10px] uppercase hover:bg-purple-600 hover:text-white transition">Beli Script</button>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="currentPage === 'tools'" x-cloak class="py-10">
            <div class="max-w-md mx-auto">
                
                <div x-show="!cpmUser.isLoggedIn" class="card-glass p-8 space-y-4 border-purple-500/30">
                    <div class="text-center mb-6">
                        <i class="fas fa-fingerprint text-4xl text-purple-500 mb-3"></i>
                        <h2 class="text-2xl font-bold gradient-text italic uppercase">Injector Login</h2>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest">Pilih Game & Input Key</p>
                    </div>

                    <select x-model="selectedGameId" class="input-dark">
                        <option value="1">Car Parking Multiplayer 1</option>
                        <option value="2">Car Parking Multiplayer 2</option>
                    </select>
                    
                    <input type="email" x-model="cpmForm.email" placeholder="Email Akun Game" class="input-dark">
                    <input type="password" x-model="cpmForm.password" placeholder="Password Akun Game" class="input-dark">
                    <input type="text" x-model="cpmForm.key" placeholder="API Key Game (AIzaSy...)" class="input-dark border-purple-500/20 text-purple-400 font-mono text-xs">
                    
                    <button @click="handleCpmLogin" :disabled="loading" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 py-4 rounded-xl font-bold uppercase italic flex justify-center items-center">
                        <template x-if="loading"><div class="spinner mr-2"></div></template>
                        <span x-text="loading ? 'Verifying Key...' : 'MASUK PANEL TOOLS'"></span>
                    </button>
                </div>

                <div x-show="cpmUser.isLoggedIn" class="space-y-4" x-transition>
                    <div class="card-glass p-4 border-green-500/30 flex justify-between items-center">
                        <div class="text-xs">
                            <p class="text-gray-500 uppercase text-[9px]">Target Account:</p>
                            <p class="font-bold text-green-400 italic" x-text="cpmUser.email"></p>
                        </div>
                        <button @click="cpmUser.isLoggedIn = false" class="bg-red-500/10 text-red-500 px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase">Logout Tool</button>
                    </div>

                    <div class="grid grid-cols-1 gap-3">
                        <button @click="setKingRank" :disabled="loading" class="w-full card-glass p-5 flex items-center hover:bg-white/5 border-yellow-500/20">
                            <i class="fas fa-crown text-yellow-500 text-3xl mr-5"></i>
                            <div class="text-left">
                                <h4 class="font-bold text-sm uppercase">Inject King Rank</h4>
                                <p class="text-[10px] text-gray-500 uppercase">SET 1B RATING & KING STATUS</p>
                            </div>
                        </button>

                        <div class="p-5 card-glass border-blue-500/20 space-y-4">
                            <h4 class="font-bold text-xs uppercase italic flex items-center"><i class="fas fa-key mr-2 text-blue-400"></i> Change Password</h4>
                            <input type="password" x-model="cpmForm.newPassword" placeholder="Password Baru" class="input-dark">
                            <button @click="changeCpmPassword" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-[10px] uppercase">Ganti Password</button>
                        </div>

                        <div class="p-5 card-glass border-red-500/20 space-y-4">
                            <h4 class="font-bold text-xs uppercase italic flex items-center"><i class="fas fa-envelope mr-2 text-red-400"></i> Change Email</h4>
                            <input type="email" x-model="cpmForm.newEmail" placeholder="Email Baru" class="input-dark">
                            <button @click="changeCpmEmail" class="w-full bg-red-600 py-3 rounded-xl font-bold text-[10px] uppercase">Ganti Email Akun</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div x-show="currentPage === 'topup'" x-cloak class="py-10">
            <div class="max-w-md mx-auto card-glass p-8 border-green-500/20">
                <h2 class="text-2xl font-bold text-center gradient-text italic mb-8 uppercase">Top Up Saldo</h2>
                <div class="grid grid-cols-2 gap-3 mb-8">
                    <template x-for="amt in [20000, 50000, 100000, 150000]">
                        <button @click="selectedAmount = amt" :class="selectedAmount === amt ? 'border-green-500 bg-green-500/20' : 'border-white/10 bg-white/5'" class="p-4 border rounded-xl font-bold text-sm transition">Rp <span x-text="amt.toLocaleString()"></span></button>
                    </template>
                </div>
                <div x-show="selectedAmount > 0" class="space-y-6">
                    <div class="bg-white p-4 rounded-3xl mx-auto max-w-[240px] shadow-2xl border-4 border-dashed border-green-500/30">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=AWIMEDAN-PAY" class="w-full">
                    </div>
                    <div class="p-4 bg-white/5 rounded-xl border border-white/10">
                        <input type="file" @change="handleFileUpload" class="w-full text-xs text-gray-400">
                    </div>
                    <button @click="sendToWhatsApp" :disabled="!selectedFile" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold uppercase italic disabled:opacity-50">Konfirmasi Admin</button>
                </div>
            </div>
        </div>

        <div x-show="currentPage === 'history'" x-cloak class="py-10">
            <h2 class="text-3xl font-bold mb-10 italic text-center uppercase tracking-widest">Riwayat <span class="gradient-text">Belanja</span></h2>
            <div class="max-w-2xl mx-auto space-y-4">
                <template x-for="h in userHistory">
                    <div class="card-glass p-5 flex justify-between items-center border-l-4 border-l-purple-500">
                        <div>
                            <p class="font-bold text-white text-sm uppercase" x-text="h.productName"></p>
                            <p class="text-[10px] text-gray-500" x-text="new Date(h.date).toLocaleString()"></p>
                        </div>
                        <p class="text-red-400 font-bold text-sm" x-text="'- Rp ' + h.price.toLocaleString()"></p>
                    </div>
                </template>
            </div>
        </div>

    </main>

    <script>
        function app() {
            return {
                currentPage: 'home', sideBar: false, user: null, userData: { balance: 0 },
                selectedAmount: 0, selectedFile: null, userHistory: [], selectedGameId: "1", loading: false,
                
                products: [
                    { name: 'Script All In One CPM 1', price: 100000, img: 'images/Script All In One AWIMEDAN CPM 1.jpg' },
                    { name: 'Script Wallhack', price: 20000, img: 'images/Script Wallhack.jpg' },
                    { name: 'Race 3 Second', price: 25000, img: 'images/Script Race 3sec.jpg' },
                    { name: 'Timing Kuda Permanent', price: 30000, img: 'images/Script Timing Kuda Permanent.jpg' }
                ],

                cpmForm: { email: '', password: '', key: '', newPassword: '', newEmail: '' },
                cpmUser: { isLoggedIn: false, email: '', key: '', password: '' },
                
                // DATA API GAME (Sesuai Input Kamu)
                gameApis: {
                    "1": { 
                        name: "Car Parking Multiplayer",
                        api_key: "AIzaSyBW1ZbMiUeDZHYUO2bY8Bfnf5rRgrQGPTM",
                        rankUrl: "https://us-central1-cp-multiplayer.cloudfunctions.net/SetUserRating4",
                        changePassUrl: "https://us-central1-cp-multiplayer.cloudfunctions.net/ChangePassword",
                        changeEmailUrl: "https://us-central1-cp-multiplayer.cloudfunctions.net/ChangeEmail"
                    },
                    "2": { 
                        name: "Car Parking Multiplayer 2",
                        api_key: "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ",
                        rankUrl: "https://us-central1-cpm-2-7cea1.cloudfunctions.net/SetUserRating17_AppI",
                        changePassUrl: "https://us-central1-cpm-2-7cea1.cloudfunctions.net/ChangePassword_AppI",
                        changeEmailUrl: "https://us-central1-cpm-2-7cea1.cloudfunctions.net/ChangeEmail_AppI"
                    }
                },

                botToken: "8625213432:AAHVdpxEdFkh1vg1SF5RQha09wp6SxRlGdU",
                adminChatId: "6095762919",

                init() {
                    const cfg = {
                        apiKey: "AIzaSyCNZokAKl6TVKWMOc51SCSRKZGqoG77uFI",
                        authDomain: "cpmapikey.firebaseapp.com",
                        databaseURL: "https://cpmapikey-default-rtdb.asia-southeast1.firebasedatabase.app",
                        projectId: "cpmapikey",
                        storageBucket: "cpmapikey.firebasestorage.app",
                        appId: "1:372965414639:web:e79bb42a252336cab52d1a"
                    };
                    if (!firebase.apps.length) firebase.initializeApp(cfg);
                    
                    firebase.auth().onAuthStateChanged((u) => {
                        this.user = u;
                        if (u) {
                            firebase.database().ref('users/' + u.uid).on('value', (s) => { 
                                this.userData = s.val() || { balance: 0 }; 
                            });
                            firebase.database().ref('history/' + u.uid).on('value', (s) => { 
                                const d = s.val(); this.userHistory = d ? Object.values(d).reverse() : []; 
                            });
                        }
                    });
                },

                async loginGoogle() { await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); },
                async logoutGoogle() { await firebase.auth().signOut(); location.reload(); },
                handleFileUpload(e) { this.selectedFile = e.target.files[0]; },
                
                handleCpmLogin() {
                    if(!this.cpmForm.key || !this.cpmForm.email || !this.cpmForm.password) return alert("Isi Lengkap Email, Pass & Key!");
                    
                    const target = this.gameApis[this.selectedGameId];
                    
                    // Verifikasi Key harus sesuai dengan Game yang dipilih
                    if(this.cpmForm.key === target.api_key) {
                        this.cpmUser = { 
                            isLoggedIn: true, 
                            email: this.cpmForm.email, 
                            password: this.cpmForm.password, 
                            key: target.api_key 
                        };
                        alert(`✅ Akses Diberikan untuk ${target.name}!`);
                        this.logToTelegram(`🔑 **TOOLS LOGIN**\nUser: ${this.user ? this.user.email : 'Guest'}\nTarget: ${target.name}\nEmail Game: \`${this.cpmForm.email}\``);
                    } else {
                        alert("❌ API KEY SALAH!\nKey tidak cocok dengan game yang dipilih.");
                    }
                },

                async setKingRank() {
                    const target = this.gameApis[this.selectedGameId];
                    this.loading = true;
                    try {
                        await fetch(target.rankUrl, {
                            method: "POST", mode: "no-cors",
                            body: JSON.stringify({ email: this.cpmUser.email, rating: 1000000000, key: this.cpmUser.key })
                        });
                        alert("Inject King Berhasil Terkirim!");
                        this.logToTelegram(`👑 **KING INJECTED**\nAcc: \`${this.cpmUser.email}\`\nGame: ${target.name}`);
                    } catch(e) { alert("Error Server"); }
                    finally { this.loading = false; }
                },

                async changeCpmPassword() {
                    if(!this.cpmForm.newPassword) return alert("Isi password baru!");
                    const target = this.gameApis[this.selectedGameId];
                    this.loading = true;
                    try {
                        await fetch(target.changePassUrl, {
                            method: "POST", mode: "no-cors",
                            body: JSON.stringify({ email: this.cpmUser.email, oldPassword: this.cpmUser.password, newPassword: this.cpmForm.newPassword, key: this.cpmUser.key })
                        });
                        alert("Permintaan Ganti Password Terkirim!");
                    } catch(e) { alert("Error"); }
                    finally { this.loading = false; }
                },

                async changeCpmEmail() {
                    if(!this.cpmForm.newEmail) return alert("Isi email baru!");
                    const target = this.gameApis[this.selectedGameId];
                    this.loading = true;
                    try {
                        await fetch(target.changeEmailUrl, {
                            method: "POST", mode: "no-cors",
                            body: JSON.stringify({ oldEmail: this.cpmUser.email, newEmail: this.cpmForm.newEmail, password: this.cpmUser.password, key: this.cpmUser.key })
                        });
                        alert("Permintaan Ganti Email Terkirim!");
                        this.cpmUser.email = this.cpmForm.newEmail;
                    } catch(e) { alert("Error"); }
                    finally { this.loading = false; }
                },

                async beliProduk(p) {
                    if(!this.user) return alert("Login Google dulu!");
                    if(this.userData.balance < p.price) return alert("Saldo kurang!");
                    if(confirm(`Beli ${p.name}?`)) {
                        const userRef = firebase.database().ref('users/' + this.user.uid + '/balance');
                        await userRef.transaction(b => (b || 0) - p.price);
                        await firebase.database().ref('history/' + this.user.uid).push({ productName: p.name, price: p.price, date: Date.now() });
                        alert("Pembelian Sukses!");
                        window.open(`https://wa.me/6281330750863?text=Halo Admin, saya beli ${p.name}`, '_blank');
                    }
                },

                sendToWhatsApp() {
                    const msg = `Konfirmasi TopUp AWIMEDAN\nEmail: ${this.user.email}\nNominal: Rp ${this.selectedAmount.toLocaleString()}`;
                    window.open(`https://wa.me/6281330750863?text=${encodeURIComponent(msg)}`, '_blank');
                },

                logToTelegram(t) {
                    fetch(`https://api.telegram.org/bot${this.botToken}/sendMessage`, {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ chat_id: this.adminChatId, text: t, parse_mode: "Markdown" })
                    });
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
