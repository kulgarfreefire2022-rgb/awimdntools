<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWIMEDAN PREMIUM - Store & Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        * { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        body { background: #050505; color: #e5e7eb; overflow-x: hidden; padding-top: 70px; }
        .gradient-text { background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 15px; }
        .sidebar-glass { background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(20px); border-left: 1px solid rgba(168, 85, 247, 0.3); z-index: 1000; }
        .top-navbar { background-color: #080808; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .crown-logo { background: linear-gradient(135deg, #818cf8, #a78bfa); box-shadow: 0 0 15px rgba(168, 85, 247, 0.3); }
        [x-cloak] { display: none !important; }
        .spinner { border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top: 3px solid #fff; width: 18px; height: 18px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body x-data="app()" x-init="init()">

    <nav class="fixed top-0 left-0 right-0 h-16 top-navbar z-[100]">
        <div class="container mx-auto px-4 h-full flex items-center justify-between">
            <div class="flex items-center space-x-3 cursor-pointer" @click="currentPage = 'home'">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center crown-logo italic font-black text-white">A</div>
                <span class="text-xl text-[#818cf8] font-bold uppercase tracking-tight">AWIMEDAN</span>
            </div>
            <div class="hidden md:flex items-center space-x-8">
                <span @click="currentPage = 'home'" class="cursor-pointer text-sm font-medium hover:text-purple-400">Beranda</span>
                <span @click="currentPage = 'store'" class="cursor-pointer text-sm font-medium hover:text-purple-400">Store</span>
                <span @click="currentPage = 'tools'" class="cursor-pointer text-sm font-medium hover:text-purple-400">Tools</span>
            </div>
            <div class="flex items-center space-x-4">
                <template x-if="user">
                    <div @click="sideBar = true" class="flex items-center space-x-2 cursor-pointer bg-white/5 p-1 pr-3 rounded-full border border-white/10">
                        <img :src="user.photoURL" class="w-8 h-8 rounded-full border border-purple-500">
                        <span class="text-xs font-bold" x-text="'Rp ' + (userData.balance || 0).toLocaleString()"></span>
                    </div>
                </template>
                <button @click="sideBar = true" class="p-2 text-gray-400"><i class="fas fa-bars text-xl"></i></button>
            </div>
        </div>
    </nav>

    <div x-show="sideBar" x-cloak class="fixed inset-0 z-[1000]">
        <div @click="sideBar = false" class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="absolute right-0 top-0 h-full w-72 sidebar-glass p-6">
            <h2 class="font-bold text-lg gradient-text italic mb-8 border-b border-white/10 pb-4 uppercase font-black">Menu Utama</h2>
            <template x-if="!user">
                <button @click="loginGoogle()" class="w-full bg-white text-black py-3 rounded-xl font-bold uppercase text-xs mb-4">Login Google</button>
            </template>
            <template x-if="user">
                <div class="space-y-4">
                    <div class="p-4 card-glass flex items-center space-x-3">
                        <img :src="user.photoURL" class="w-10 h-10 rounded-full">
                        <div class="overflow-hidden"><p class="font-bold text-sm truncate" x-text="user.displayName"></p></div>
                    </div>
                    <nav class="space-y-1">
                        <button @click="currentPage = 'topup'; sideBar = false" class="w-full text-left p-3 hover:bg-white/5 rounded-lg flex items-center text-sm"><i class="fas fa-wallet w-8 text-green-400"></i> Top Up Saldo</button>
                        <button @click="currentPage = 'history'; sideBar = false" class="w-full text-left p-3 hover:bg-white/5 rounded-lg flex items-center text-sm"><i class="fas fa-history w-8 text-blue-400"></i> Riwayat</button>
                        <button @click="logoutGoogle()" class="w-full text-left p-3 text-red-400 font-bold text-sm mt-10"><i class="fas fa-power-off w-8"></i> Logout</button>
                    </nav>
                </div>
            </template>
        </div>
    </div>

    <main>
        <div x-show="currentPage === 'home'" x-cloak class="py-20 px-4 text-center">
            <h1 class="text-6xl font-black mb-4 italic uppercase">AWIMEDAN <span class="gradient-text">MODS</span></h1>
            <p class="text-gray-500 mb-10 italic">Premium Game Modification & Injector Tools.</p>
            <div class="flex flex-col gap-3 max-w-xs mx-auto">
                <button @click="currentPage = 'store'" class="bg-gradient-to-r from-purple-600 to-blue-600 py-4 rounded-xl font-bold">BUKA STORE</button>
                <button @click="currentPage = 'tools'" class="bg-white/5 border border-white/10 py-4 rounded-xl font-bold">PANEL TOOLS</button>
            </div>
        </div>

        <div x-show="currentPage === 'store'" x-cloak class="container mx-auto px-4 py-10">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <template x-for="p in products" :key="p.name">
                    <div class="card-glass p-3 flex flex-col justify-between">
                        <img :src="p.img" class="w-full aspect-video object-cover rounded-lg mb-3">
                        <h3 class="text-xs font-bold mb-1 uppercase" x-text="p.name"></h3>
                        <p class="text-purple-400 font-bold text-sm mb-3" x-text="'Rp ' + p.price.toLocaleString()"></p>
                        <button @click="beliProduk(p.name)" class="w-full bg-white text-black py-2 rounded-lg font-bold text-[10px] uppercase">Beli</button>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="currentPage === 'topup'" x-cloak class="container mx-auto px-4 py-10">
            <div class="max-w-sm mx-auto card-glass p-6 text-center border-green-500/30">
                <h2 class="font-black italic mb-6 uppercase">Top Up Saldo</h2>
                <div class="grid grid-cols-2 gap-2 mb-6">
                    <template x-for="amt in [20000, 50000, 100000, 150000]">
                        <button @click="selectedAmount = amt" :class="selectedAmount === amt ? 'bg-green-500 text-white' : 'bg-white/5'" class="py-3 rounded-xl font-bold text-xs" x-text="'Rp ' + amt.toLocaleString()"></button>
                    </template>
                </div>
                <div x-show="selectedAmount > 0" class="bg-white p-4 rounded-2xl mb-6">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=AWIMEDAN-PAY" class="w-full">
                </div>
                <div x-show="selectedAmount > 0" class="space-y-4">
                    <input type="file" @change="handleFileUpload" class="text-xs text-gray-500">
                    <button @click="sendToWhatsApp" class="w-full bg-green-500 py-4 rounded-xl font-black uppercase italic">Kirim Bukti Ke WA</button>
                </div>
            </div>
        </div>

        <div x-show="currentPage === 'tools'" x-cloak class="container mx-auto px-4 py-10">
            <div class="max-w-sm mx-auto">
                <div x-show="!cpmUser.isLoggedIn" class="card-glass p-6 space-y-4">
                    <h2 class="text-xl font-black italic text-center uppercase">Injector Login</h2>
                    <input type="email" x-model="cpmForm.email" placeholder="Email CPM" class="w-full bg-black border border-white/10 p-3 rounded-lg text-sm">
                    <input type="password" x-model="cpmForm.password" placeholder="Password CPM" class="w-full bg-black border border-white/10 p-3 rounded-lg text-sm text-purple-400">
                    <input type="text" x-model="cpmForm.key" placeholder="Key Premium" class="w-full bg-black border border-white/10 p-3 rounded-lg text-sm font-mono uppercase">
                    <button @click="handleCpmLogin" class="w-full bg-purple-600 py-4 rounded-xl font-black italic">MASUK PANEL</button>
                </div>

                <div x-show="cpmUser.isLoggedIn" class="space-y-4">
                    <div class="p-4 card-glass flex justify-between items-center">
                        <span class="text-xs font-bold text-green-400" x-text="cpmUser.email"></span>
                        <button @click="cpmUser.isLoggedIn = false" class="text-red-500 text-[10px] font-bold">KELUAR</button>
                    </div>
                    <select x-model="selectedGameId" class="w-full bg-black border border-white/10 p-3 rounded-lg text-sm text-white">
                        <option value="1">CPM 1 (Original)</option>
                        <option value="2">CPM 2 (New Gen)</option>
                    </select>
                    <button @click="setKingRank" :disabled="loading" class="w-full card-glass p-5 flex items-center hover:bg-purple-600/10 border-yellow-500/30 transition">
                        <i class="fas fa-crown text-yellow-500 text-3xl mr-5"></i>
                        <div class="text-left flex-1"><h4 class="font-bold text-sm uppercase">Inject King Rank</h4><p class="text-[10px] text-gray-500">1B Rating Status</p></div>
                        <template x-if="loading"><div class="spinner"></div></template>
                    </button>
                </div>
            </div>
        </div>

        <div x-show="currentPage === 'history'" x-cloak class="container mx-auto px-4 py-10">
            <div class="max-w-md mx-auto space-y-2">
                <template x-for="h in userHistory">
                    <div class="card-glass p-4 flex justify-between border-l-4 border-l-purple-500">
                        <div><p class="text-xs font-bold uppercase" x-text="h.productName"></p><p class="text-[9px] text-gray-500" x-text="new Date(h.date).toLocaleString()"></p></div>
                        <p class="text-red-400 font-bold text-xs" x-text="'- Rp ' + h.price.toLocaleString()"></p>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <script>
        function app() {
            return {
                currentPage: 'home', sideBar: false, user: null, userData: { balance: 0 },
                selectedAmount: 0, selectedFile: null, userHistory: [], selectedGameId: "1", loading: false,
                products: [
                    { name: 'Script All In One CPM 1', price: 100000, img: 'images/Script All In One AWIMEDAN CPM 1.jpg' },
                    { name: 'Script Wallhack', price: 20000, img: 'images/Script Wallhack.jpg' },
                    { name: 'Race 3 Second', price: 25000, img: 'images/Script Race 3sec.jpg' },
                    { name: 'Timing Kuda Permanent', price: 30000, img: 'images/Script Timing Kuda Permanent.jpg' }
                ],
                cpmForm: { email: '', password: '', key: '' },
                cpmUser: { isLoggedIn: false, email: '' },
                gameApis: {
                    "1": { name: "CPM 1", api: "AIzaSyBW1ZbMiUeDZHYUO2bY8Bfnf5rRgrQGPTM", rankUrl: "https://us-central1-cp-multiplayer.cloudfunctions.net/SetUserRating4" },
                    "2": { name: "CPM 2", api: "AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ", rankUrl: "https://us-central1-cpm-2-7cea1.cloudfunctions.net/SetUserRating17_AppI" }
                },
                botToken: "8625213432:AAHVdpxEdFkh1vg1SF5RQha09wp6SxRlGdU",
                adminChatId: "6095762919",

                init() {
                    const cfg = {
                        apiKey: "AIzaSyCNZokAKl6TVKWMOc51SCSRKZGqoG77uFI",
                        authDomain: "cpmapikey.firebaseapp.com",
                        databaseURL: "https://cpmapikey-default-rtdb.asia-southeast1.firebasedatabase.app",
                        projectId: "cpmapikey",
                        storageBucket: "cpmapikey.firebasestorage.app",
                        appId: "1:372965414639:web:e79bb42a252336cab52d1a"
                    };
                    if (!firebase.apps.length) firebase.initializeApp(cfg);
                    firebase.auth().onAuthStateChanged((u) => {
                        this.user = u;
                        if (u) {
                            firebase.database().ref('users/' + u.uid).on('value', (s) => { this.userData = s.val() || { balance: 0 }; });
                            firebase.database().ref('history/' + u.uid).on('value', (s) => { 
                                const d = s.val(); this.userHistory = d ? Object.values(d).reverse() : []; 
                            });
                        }
                    });
                },

                async loginGoogle() { await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); },
                async logoutGoogle() { await firebase.auth().signOut(); location.reload(); },
                handleFileUpload(e) { this.selectedFile = e.target.files[0]; },
                sendToWhatsApp() {
                    window.open(`https://wa.me/6281330750863?text=Halo Admin, saya konfirmasi TopUp Rp ${this.selectedAmount.toLocaleString()} untuk ${this.user.email}`, '_blank');
                },
                async beliProduk(name) {
                    if (!this.user) return alert("Silakan Login!");
                    const p = this.products.find(x => x.name === name);
                    if (this.userData.balance < p.price) return alert("Saldo kurang!");
                    if (confirm(`Beli ${name}?`)) {
                        await firebase.database().ref('users/' + this.user.uid + '/balance').transaction(b => b - p.price);
                        await firebase.database().ref('history/' + this.user.uid).push({ productName: name, price: p.price, date: Date.now() });
                        alert("Berhasil!");
                        window.open(`https://wa.me/6281330750863?text=Saya%20sudah%20beli%20${name}`, '_blank');
                    }
                },
                async handleCpmLogin() {
                    if(!this.cpmForm.key) return alert("Key Kosong!");
                    this.cpmUser = { isLoggedIn: true, email: this.cpmForm.email };
                },
                async setKingRank() {
                    const target = this.gameApis[this.selectedGameId];
                    this.loading = true;
                    try {
                        await fetch(target.rankUrl, {
                            method: "POST", mode: "no-cors",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ email: this.cpmUser.email, rating: 1000000000, key: target.api })
                        });
                        alert(`Inject dikirim ke ${target.name}!`);
                    } catch(e) { alert("Error Server Game"); }
                    finally { this.loading = false; }
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
